name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release

      - name: Create app bundle
        run: |
          APP_NAME="LibreLinkForMac"
          APP_BUNDLE=".build/release/${APP_NAME}.app"
          mkdir -p "${APP_BUNDLE}/Contents/MacOS"
          mkdir -p "${APP_BUNDLE}/Contents/Resources"
          cp ".build/release/${APP_NAME}" "${APP_BUNDLE}/Contents/MacOS/${APP_NAME}"
          cp "Sources/${APP_NAME}/Info.plist" "${APP_BUNDLE}/Contents/Info.plist"
          echo "APPL????" > "${APP_BUNDLE}/Contents/PkgInfo"

      - name: Create DMG
        run: |
          hdiutil create -volname "LibreLinkForMac" \
            -srcfolder ".build/release/LibreLinkForMac.app" \
            -ov -format UDZO \
            ".build/release/LibreLinkForMac.dmg"

      - name: Create ZIP
        run: |
          cd .build/release
          zip -r LibreLinkForMac.zip LibreLinkForMac.app

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LibreLinkForMac
          path: |
            .build/release/LibreLinkForMac.dmg
            .build/release/LibreLinkForMac.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .build/release/LibreLinkForMac.dmg
            .build/release/LibreLinkForMac.zip
          generate_release_notes: true
